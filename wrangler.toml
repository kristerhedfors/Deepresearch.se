# Cloudflare Workers config.
# `npx wrangler deploy` uploads the Worker (src/index.js) plus ./public assets.
#
# IMPORTANT: `name` must match the Worker's name in the Cloudflare dashboard
# (Workers & Pages -> your project). If it differs, the deploy lands on a
# different Worker that the domain isn't mapped to.
name = "deepresearch-se"
main = "src/index.js"
compatibility_date = "2026-07-04"

# Custom domains served by this Worker. Cloudflare provisions the DNS record and
# TLS cert automatically; the zone must be active in this same account.
routes = [
  { pattern = "deepresearch.se", custom_domain = true },
  { pattern = "www.deepresearch.se", custom_domain = true },
]

# Non-secret configuration. Secrets (BERGET_API_TOKEN, EXA_API_KEY,
# BASIC_AUTH_USER, BASIC_AUTH_PASS) are set in the dashboard, never here.
[vars]
LOG_LEVEL = "info" # debug | info | warn | error

# run_worker_first + binding: the Worker sees every request (so Basic Auth
# gates the static UI too) and serves assets via env.ASSETS.fetch().
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Workers Logs: persists the structured JSON logs, queryable in the dashboard
# (Worker -> Logs) or live via `npx wrangler tail`.
[observability]
enabled = true

# D1 database for accounts, invitations, and research quotas. ONE-TIME SETUP:
#   npx wrangler d1 create deepresearch-se
# then paste the printed database_id below and uncomment the block. Until
# then the Worker runs fine with accounts/quotas disabled (admin secrets
# only). The schema applies itself on first use — no migration step.
#
# [[d1_databases]]
# binding = "DB"
# database_name = "deepresearch-se"
# database_id = "PASTE-DATABASE-ID-HERE"
