# Cloudflare Workers config.
# `npx wrangler deploy` uploads the Worker (src/index.js) plus ./public assets.
#
# IMPORTANT: `name` must match the Worker's name in the Cloudflare dashboard
# (Workers & Pages -> your project). If it differs, the deploy lands on a
# different Worker that the domain isn't mapped to.
name = "deepresearch-se"
main = "src/index.js"
compatibility_date = "2026-07-04"

# Custom domains served by this Worker. Cloudflare provisions the DNS record and
# TLS cert automatically; the zone must be active in this same account.
routes = [
  { pattern = "deepresearch.se", custom_domain = true },
  { pattern = "www.deepresearch.se", custom_domain = true },
]

# Non-secret configuration. Secrets (BERGET_API_TOKEN, EXA_API_KEY,
# BASIC_AUTH_USER, BASIC_AUTH_PASS, HISTORY_KEY_SECRET) are set in the
# dashboard, never here.
[vars]
LOG_LEVEL = "info" # debug | info | warn | error
# ADMIN_EMAIL (the Google account that gets and keeps the admin role on
# sign-in; everyone else is auto-provisioned as a regular, quota-capped
# user) is configured directly as a Cloudflare dashboard variable, not
# declared here, so it isn't public in this file.

# run_worker_first + binding: the Worker sees every request (so Basic Auth
# gates the static UI too) and serves assets via env.ASSETS.fetch().
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Workers Logs: persists the structured JSON logs, queryable in the dashboard
# (Worker -> Logs) or live via `npx wrangler tail`.
[observability]
enabled = true

# Raise the CPU-time ceiling to the Workers Paid plan's max (default 30s).
# Round 4's cybersecurity battery (mid-long 150s time budgets) found
# Cloudflare killing several models' requests with outcome "exceededCpu"
# mid-pipeline — a longer time budget legitimately plans deeper research
# (more searches/gap rounds/a bigger synthesis digest), and the extra
# processing tipped verbose models' requests past the ceiling before this
# account was upgraded to Workers Paid. A first attempt at this same
# config was rejected outright by Cloudflare's deploy API on the
# then-Free plan ("CPU limits are not supported for the Free plan", code
# 100328 — a hard deploy failure, not a silent no-op) and had to be
# reverted; see tests/MODEL-EVAL-FINDINGS.md's round 4 entry. Re-added
# now that the account is confirmed on Workers Paid.
[limits]
cpu_ms = 300_000

# D1 database for accounts and research quotas. The schema applies itself
# on first use — no migration step. Without this binding the Worker still
# runs, but Google sign-in is disabled (break-glass admin auth only).
[[d1_databases]]
binding = "DB"
database_name = "deepresearch-se"
database_id = "d9144c29-c8b2-4914-a795-37f8df393ac8"
