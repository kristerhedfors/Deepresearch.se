# Cloudflare Workers static-assets config.
# `npx wrangler deploy` uploads everything in ./public as static files.
#
# IMPORTANT: `name` must match your Worker's name in the Cloudflare dashboard
# (Workers & Pages -> your project). If it differs, change this one line or the
# deploy lands on a different Worker that your domain isn't mapped to.
name = "deepresearch-se"
main = "src/index.js"
compatibility_date = "2026-07-04"

# Custom domains served by this Worker. Cloudflare provisions the DNS record and
# TLS cert automatically; the zone must be active in this same account.
routes = [
  { pattern = "deepresearch.se", custom_domain = true },
  { pattern = "www.deepresearch.se", custom_domain = true },
]

# run_worker_first + binding: the Worker sees every request (so Basic Auth
# gates the static UI too) and serves assets via env.ASSETS.fetch().
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
