# Cloudflare Workers config.
# `npx wrangler deploy` uploads the Worker (src/index.js) plus ./public assets.
#
# IMPORTANT: `name` must match the Worker's name in the Cloudflare dashboard
# (Workers & Pages -> your project). If it differs, the deploy lands on a
# different Worker that the domain isn't mapped to.
name = "deepresearch-se"
main = "src/index.js"
compatibility_date = "2026-07-04"

# Custom domains served by this Worker. Cloudflare provisions the DNS record and
# TLS cert automatically; the zone must be active in this same account.
routes = [
  { pattern = "deepresearch.se", custom_domain = true },
  { pattern = "www.deepresearch.se", custom_domain = true },
]

# Per-version PREVIEW URLs (branch previews — see the **deploy** skill):
# every uploaded version (a Workers Builds non-production branch build, or a
# manual `npx wrangler versions upload`) gets its own
# https://<version-prefix>-deepresearch-se.<subdomain>.workers.dev URL,
# WITHOUT shifting any production traffic. This is how an isolated feature
# branch is tried live before merge. Production stays on the custom domains
# above; the preview host passes src/canonical.js untouched (it only rewrites
# http/www). Caveats (Google OAuth won't work on the preview host — use
# break-glass Basic Auth or the public /cure tier; previews share production
# bindings) are documented in the deploy skill.
preview_urls = true

# Non-secret configuration. Secrets (BERGET_API_TOKEN, EXA_API_KEY,
# BASIC_AUTH_USER, BASIC_AUTH_PASS, HISTORY_KEY_SECRET, the optional
# SHODAN_API_KEY that enables the per-user Shodan host-intelligence knob, and
# the optional GOOGLE_MAPS_API_KEY that enables the per-user Google Maps &
# Street View knob) are set in the dashboard, never here. Without
# SHODAN_API_KEY / GOOGLE_MAPS_API_KEY those features are simply invisible:
# /api/settings reports them unavailable and the UI hides the knob. The
# server-side GOOGLE_MAPS_API_KEY needs these Google Cloud APIs enabled: Places
# API (places.googleapis.com), Maps Static API
# (static-maps-backend.googleapis.com) and Street View Static API
# (street-view-image-backend.googleapis.com). The inline navigable Street View
# iframe uses an OPTIONAL GOOGLE_MAPS_EMBED_KEY, which defaults to
# GOOGLE_MAPS_API_KEY when unset — safe as long as that key is HTTP-referrer-
# locked to *.deepresearch.se/* (the mitigation for browser exposure). Set a
# dedicated Embed-API-only key only to narrow the browser-exposed scope.
[vars]
LOG_LEVEL = "debug" # debug | info | warn | error — temporarily debug for sandbox-filesystem heavy testing (2026-07-12); revert to "info" when done
# ADMIN_EMAIL (the Google account that gets and keeps the admin role on
# sign-in; everyone else is auto-provisioned as a regular, quota-capped
# user) is configured directly as a Cloudflare dashboard variable, not
# declared here, so it isn't public in this file.

# run_worker_first + binding: the Worker sees every request (so Basic Auth
# gates the static UI too) and serves assets via env.ASSETS.fetch().
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

# Workers Logs: persists the structured JSON logs, queryable in the dashboard
# (Worker -> Logs) or live via `npx wrangler tail`.
[observability]
enabled = true

# Raise the CPU-time ceiling to the Workers Paid plan's max (default 30s).
# Round 4's cybersecurity battery (mid-long 150s time budgets) found
# Cloudflare killing several models' requests with outcome "exceededCpu"
# mid-pipeline — a longer time budget legitimately plans deeper research
# (more searches/gap rounds/a bigger synthesis digest), and the extra
# processing tipped verbose models' requests past the ceiling before this
# account was upgraded to Workers Paid. A first attempt at this same
# config was rejected outright by Cloudflare's deploy API on the
# then-Free plan ("CPU limits are not supported for the Free plan", code
# 100328 — a hard deploy failure, not a silent no-op) and had to be
# reverted; see tests/MODEL-EVAL-FINDINGS.md's round 4 entry. Re-added
# now that the account is confirmed on Workers Paid.
[limits]
cpu_ms = 300_000

# D1 database for accounts and research quotas. The schema applies itself
# on first use — no migration step. Without this binding the Worker still
# runs, but Google sign-in is disabled (break-glass admin auth only).
[[d1_databases]]
binding = "DB"
database_name = "deepresearch-se"
database_id = "d9144c29-c8b2-4914-a795-37f8df393ac8"

# ---- Cloud storage (implicit on the Se/rver tier — no per-account knob) -----
# R2 holds encrypted conversation records, attached original files, and the
# exportable RAG index copies (src/storage.js, src/rag.js); Vectorize holds
# the document-RAG vectors (dimensions must match src/berget.js's embedding
# model — multilingual-e5-large = 1024).
#
# These resources were created 2026-07-06 (R2 bucket with location hint
# weur; Vectorize index 1024 dims/cosine with a string metadata index on
# `u`) — the bindings below MUST NOT be declared before the resources
# exist, or every deploy fails outright (same failure class as the round-4
# cpu_ms incident — see tests/MODEL-EVAL-FINDINGS.md). Removing the
# bindings simply switches the feature off: /api/settings reports it
# unavailable and the UI hides the knob. Recreate from scratch with:
#
#   npx wrangler r2 bucket create deepresearch-se-storage --location weur
#   npx wrangler vectorize create deepresearch-se-rag --dimensions=1024 --metric=cosine
#   npx wrangler vectorize create-metadata-index deepresearch-se-rag --property-name=u --type=string

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "deepresearch-se-storage"

[[vectorize]]
binding = "RAG_INDEX"
index_name = "deepresearch-se-rag"
