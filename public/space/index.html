<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepResearch.se — space animations</title>
  <link rel="icon" href="/favicon.ico?v=4" sizes="48x48">
  <meta name="theme-color" content="#05070f">
  <meta name="description" content="An archive of playable wireframe space animations answering common space questions — zoom from a moon's surface to the nearest star. Only the stars shine; everything else is 3D wireframe.">
  <style>
    /* The space surface is the one page that is dark by nature: the scene IS
       the night sky. Stars are the only lit thing (real glow, additive);
       every 3D body, craft and figure renders as unlit wireframe — that
       contrast is the page's visual identity, so there is no light theme. */
    :root {
      color-scheme: dark;
      --bg: #05070f; --panel: #0b101f; --panel-2: #101729; --border: #1d2a45;
      --text: #d7e3f7; --muted: #8298ba; --accent: #7fb4ee; --wire: #9db9d6;
      --q-bg: #14203a; --good: #35c98f; --bad: #e0685f;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text); margin: 0; padding: 1.25rem 1rem 4rem; line-height: 1.5;
      background:
        radial-gradient(1200px 600px at 70% -10%, #0c1430 0%, transparent 60%),
        var(--bg);
    }
    main { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
    .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    h1 { font-size: 1.2rem; margin: 0; letter-spacing: .01em; }
    .sub { color: var(--muted); font-size: .85rem; margin: .25rem 0 0; max-width: 40rem; }
    .topbtns { display: flex; gap: .5rem; align-items: center; }
    a.back, button.lang {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.16);
      color: var(--text); text-decoration: none; font-weight: 600; font-size: .85rem;
      border-radius: 10px; padding: .45rem .8rem; white-space: nowrap; cursor: pointer;
    }
    button.lang.active { border-color: var(--accent); color: var(--accent); }

    /* Ask box — the question → animation matcher. */
    .ask { display: flex; gap: .5rem; }
    .ask input {
      flex: 1; background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; padding: .6rem .9rem; font-size: .95rem; outline: none;
    }
    .ask input:focus { border-color: var(--accent); }
    .ask button {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 12px; padding: .6rem 1rem; font-size: .9rem; cursor: pointer;
    }
    .askmiss { color: var(--muted); font-size: .82rem; min-height: 1.2em; margin: -.4rem 0 0 .2rem; }

    /* Archive chips. */
    .chips { display: flex; gap: .45rem; flex-wrap: wrap; }
    .chips button {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      border-radius: 999px; padding: .3rem .75rem; font-size: .82rem; cursor: pointer;
    }
    .chips button:hover { border-color: var(--accent); }

    /* Gallery cards: question bubble → animation stage → reply → feedback. */
    article.card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
      padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: .8rem;
      scroll-margin-top: 1rem;
    }
    article.card.flash { animation: flash 1.6s ease-out; }
    @keyframes flash { 0% { border-color: var(--accent); box-shadow: 0 0 24px rgba(127,180,238,.35); } 100% { border-color: var(--border); box-shadow: none; } }
    .q { display: flex; gap: .6rem; align-items: flex-start; }
    .q .who {
      flex: 0 0 auto; width: 1.7rem; height: 1.7rem; border-radius: 50%;
      background: var(--q-bg); border: 1px solid var(--border); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700;
    }
    .q p {
      margin: 0; background: var(--q-bg); border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px; padding: .5rem .8rem; font-size: .98rem; font-weight: 600;
    }
    /* The animation stage (canvas + HUD + corner notes) is styled by the
       shared embeddable renderer /js/space-embed.js — it injects its own
       sp-scoped CSS, the same stage the chat embed uses. */
    .reply { display: flex; gap: .6rem; align-items: flex-start; }
    .reply .who {
      flex: 0 0 auto; width: 1.7rem; height: 1.7rem; border-radius: 50%;
      background: var(--panel-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: .85rem;
    }
    .reply p {
      margin: 0; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px; padding: .55rem .8rem; font-size: .9rem; color: var(--text);
    }

    /* Feedback row. */
    .fb { display: flex; flex-direction: column; gap: .5rem; }
    .fbrow { display: flex; gap: .5rem; align-items: center; font-size: .82rem; color: var(--muted); flex-wrap: wrap; }
    .fb button.v {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 10px;
      padding: .3rem .7rem; font-size: .95rem; cursor: pointer; color: var(--text);
    }
    .fb button.v.picked-up { border-color: var(--good); }
    .fb button.v.picked-down { border-color: var(--bad); }
    .fb textarea {
      background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: .5rem .7rem; font-size: .85rem; resize: vertical;
      min-height: 2.4rem; width: 100%;
    }
    .fb .send {
      align-self: flex-start; background: var(--panel-2); border: 1px solid var(--accent);
      color: var(--accent); border-radius: 10px; padding: .35rem .9rem; font-size: .85rem; cursor: pointer;
    }
    .fb .done { color: var(--good); font-size: .85rem; }
    .fb .err { color: var(--bad); font-size: .85rem; }

    footer { color: var(--muted); font-size: .8rem; text-align: center; margin-top: 1rem; }
    footer a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="top">
      <div>
        <h1 id="t-title">DeepResearch.se — space animations</h1>
        <p class="sub" id="t-sub"></p>
      </div>
      <div class="topbtns">
        <button class="lang" id="lang-en" type="button">EN</button>
        <button class="lang" id="lang-sv" type="button">SV</button>
        <a class="back" href="/">←&nbsp;DeepResearch.se</a>
      </div>
    </div>
    <form class="ask" id="ask">
      <input id="ask-input" type="text" autocomplete="off">
      <button type="submit" id="ask-btn"></button>
    </form>
    <div class="askmiss" id="ask-miss"></div>
    <div class="chips" id="chips"></div>
    <div id="gallery"></div>
    <footer id="t-foot"></footer>
  </main>
  <script type="module" src="/space/space.js"></script>
</body>
</html>
