<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeepResearch.se — documentation viewer</title>
  <link rel="icon" href="/favicon.ico?v=4" sizes="48x48">
  <meta name="theme-color" content="#0d1117">
  <style>
    :root {
      --bg: #eef2f7; --panel: #ffffff; --border: #d7dee7; --text: #16202c;
      --muted: #5b6b7c; --accent: #2563eb; --side: #f6f8fb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f14; --panel: #121821; --border: #263140; --text: #dbe4ee;
        --muted: #8fa1b3; --accent: #5b9bff; --side: #0f151d;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr;
      grid-template-areas: "head head" "side main"; height: 100vh;
    }
    header {
      grid-area: head; display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; padding: .7rem 1rem; background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1rem; margin: 0; font-weight: 700; }
    header .note { font-size: .8rem; color: var(--muted); }
    header a.back { color: var(--accent); text-decoration: none; font-size: .85rem; font-weight: 600; }
    nav {
      grid-area: side; background: var(--side); border-right: 1px solid var(--border);
      overflow-y: auto; padding: .5rem;
    }
    nav input {
      width: 100%; padding: .45rem .6rem; margin-bottom: .5rem; font: inherit;
      border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--text);
    }
    nav a {
      display: flex; align-items: center; justify-content: space-between; gap: .4rem;
      padding: .38rem .55rem; border-radius: 7px; text-decoration: none; color: var(--text);
      font-size: .84rem; cursor: pointer;
    }
    nav a:hover { background: var(--border); }
    nav a.active { background: var(--accent); color: #fff; }
    nav a .badge {
      font-size: .62rem; font-weight: 700; letter-spacing: .03em; text-transform: uppercase;
      padding: .08rem .32rem; border-radius: 999px; background: rgba(37,99,235,.16); color: var(--accent);
    }
    nav a.active .badge { background: rgba(255,255,255,.25); color: #fff; }
    nav .group { font-size: .68rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: .8rem .55rem .25rem; }
    main { grid-area: main; overflow-y: auto; }
    article { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.6rem 6rem; }
    .status {
      font-size: .82rem; color: var(--muted); background: var(--panel);
      border: 1px solid var(--border); border-radius: 8px; padding: .5rem .7rem; margin-bottom: 1rem;
    }
    .status b { color: var(--text); }
    .doc h1 { font-size: 1.7rem; margin: .2rem 0 1rem; }
    .doc h2 { font-size: 1.3rem; margin: 1.8rem 0 .6rem; border-bottom: 1px solid var(--border); padding-bottom: .25rem; }
    .doc h3 { font-size: 1.08rem; margin: 1.3rem 0 .4rem; }
    .doc p, .doc li { font-size: .95rem; }
    .doc code { background: var(--side); border: 1px solid var(--border); border-radius: 4px; padding: 0 .3rem; font-size: .86em; }
    .doc pre { background: var(--side); border: 1px solid var(--border); border-radius: 10px; padding: .8rem 1rem; overflow-x: auto; }
    .doc pre code { border: 0; padding: 0; background: none; }
    .doc table { border-collapse: collapse; display: block; overflow-x: auto; margin: .8rem 0; }
    .doc th, .doc td { border: 1px solid var(--border); padding: .4rem .6rem; font-size: .88rem; text-align: left; }
    .doc img.doc-img { max-width: 100%; height: auto; border: 1px solid var(--border); border-radius: 8px; }
    .doc a { color: var(--accent); }
    .empty { color: var(--muted); padding: 2rem 0; }
    @media (max-width: 720px) {
      body { grid-template-columns: 1fr; grid-template-areas: "head" "side" "main"; height: auto; }
      nav { max-height: 40vh; border-right: 0; border-bottom: 1px solid var(--border); }
    }
  </style>
  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/purify.min.js"></script>
</head>
<body>
  <header>
    <h1>DeepResearch.se documentation</h1>
    <span class="note">The project's living documentation, straight from the repo.</span>
    <a class="back" href="/rver">← App</a>
  </header>
  <nav>
    <input id="filter" type="search" placeholder="Filter documents…" aria-label="Filter documents">
    <div id="list"></div>
  </nav>
  <main>
    <article>
      <div id="status" class="status" hidden></div>
      <div id="doc" class="doc"><p class="empty">Loading documentation…</p></div>
    </article>
  </main>
  <script type="module" src="/js/docs-viewer.js"></script>
</body>
</html>
