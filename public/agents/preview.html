<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent preview — DeepResearch.Se</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #05070b; color: #e8edf4;
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    header { padding: 20px 24px 8px; }
    header h1 { font-size: 19px; margin: 0 0 4px; }
    header p { margin: 0; color: #93a1b5; font-size: 13px; }
    header a { color: #7cb0ff; }
    main { display: grid; grid-template-columns: 200px 1fr; gap: 20px; padding: 16px 24px 40px; align-items: start; }
    #rail { display: flex; flex-direction: column; gap: 8px; }
    .railbtn { text-align: left; background: rgba(255,255,255,.05); color: inherit;
      border: 1px solid rgba(255,255,255,.10); border-radius: 10px; padding: 10px 12px; cursor: pointer;
      display: flex; flex-direction: column; gap: 2px; }
    .railbtn.active { border-color: #3b82f6; background: rgba(59,130,246,.12); }
    .railbtn strong { font-size: 14px; }
    .railbtn span { font-size: 11px; color: #8ea0b6; }
    #stage { display: grid; grid-template-columns: minmax(320px, 1fr) minmax(280px, 1fr); gap: 20px; align-items: start; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } #stage { grid-template-columns: 1fr; } }

    /* The composer pane — themed from the agent's CSS custom properties. */
    .pane { }
    .agent-composer { background: var(--agent-bg); color: var(--agent-fg);
      border: 1px solid color-mix(in srgb, var(--agent-accent) 40%, transparent);
      border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .ac-head { display: flex; flex-direction: column; gap: 2px; }
    .ac-name { color: var(--agent-accent); font-size: 16px; }
    .ac-tag { color: color-mix(in srgb, var(--agent-fg) 65%, transparent); font-size: 12px; }
    .ac-examples { display: flex; flex-wrap: wrap; gap: 6px; }
    .ac-example { background: var(--agent-accent-soft); color: var(--agent-fg); border: 0;
      border-radius: 999px; padding: 5px 10px; font-size: 12px; text-align: left; cursor: pointer; }
    .ac-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .ac-ctl { display: inline-flex; align-items: center; gap: 6px; font-size: 12px;
      color: color-mix(in srgb, var(--agent-fg) 80%, transparent); }
    .ac-ctl span { white-space: nowrap; }
    .ac-ticks { display: inline-flex; gap: 4px; opacity: .6; font-size: 10px; }
    select, input[type=range] { accent-color: var(--agent-accent); }
    select { background: rgba(255,255,255,.06); color: var(--agent-fg);
      border: 1px solid rgba(255,255,255,.14); border-radius: 8px; padding: 3px 6px; }
    .ac-promptrow { display: flex; gap: 8px; align-items: flex-end; }
    .ac-prompt { flex: 1; resize: vertical; background: rgba(255,255,255,.05); color: var(--agent-fg);
      border: 1px solid color-mix(in srgb, var(--agent-accent) 30%, transparent); border-radius: 10px; padding: 8px 10px; font: inherit; }
    .ac-send { background: var(--agent-accent); color: #05070b; border: 0; border-radius: 10px;
      padding: 9px 16px; font-weight: 600; cursor: pointer; }
    .ac-attach { background: transparent; color: inherit; border: 1px solid rgba(255,255,255,.16);
      border-radius: 8px; padding: 5px 8px; cursor: pointer; }

    /* The meta / actions column. */
    .meta h2 { font-size: 17px; margin: 0 0 2px; }
    .meta .tier { font-size: 11px; color: #8ea0b6; font-weight: 400; }
    .meta .tag { color: #9fb0c4; margin: 0 0 12px; font-size: 13px; }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 4px 12px; margin: 0 0 14px; font-size: 13px; }
    dt { color: #7d8aa0; } dd { margin: 0; }
    .meta h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: #8ea0b6; margin: 14px 0 6px; }
    .examples { display: flex; flex-wrap: wrap; gap: 6px; }
    .ex { background: rgba(59,130,246,.12); color: #cfe0ff; border: 1px solid rgba(59,130,246,.3);
      border-radius: 999px; padding: 5px 10px; font-size: 12px; text-decoration: none; }
    .ex:hover { background: rgba(59,130,246,.22); }
    .quota code { background: rgba(255,255,255,.06); padding: 4px 8px; border-radius: 8px; font-size: 12px; }
    .share { display: flex; gap: 8px; margin-top: 8px; }
    .share input { flex: 1; background: rgba(255,255,255,.05); color: #cfe0ff;
      border: 1px solid rgba(255,255,255,.14); border-radius: 8px; padding: 6px 8px; font: 12px monospace; }
    .share button { background: #3b82f6; color: #05070b; border: 0; border-radius: 8px; padding: 6px 12px; font-weight: 600; cursor: pointer; }
    .muted { color: #7d8aa0; font-size: 13px; }
    .src { color: #6b7789; font-size: 11px; margin-top: 14px; }
    .src a { color: #7cb0ff; }
  </style>
</head>
<body>
  <header>
    <h1>Agent preview</h1>
    <p>Every pane is rendered from its spec in <code>sdk/AGENTS.json</code> — an agent is its chat-input pane, theme, animations, examples and share-link quota. <a href="/docs#AGENT-PLATFORM">Read the docs</a> · <a href="/">back to the app</a></p>
  </header>
  <main>
    <nav id="rail" aria-label="Agents"></nav>
    <section id="stage"><p class="muted">Loading agents…</p></section>
  </main>
  <script type="module" src="/js/agent-preview.js"></script>
</body>
</html>
