<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deepresearch.se</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #12151c;
      --panel-2: #0f1218;
      --border: #232833;
      --text: #e8edf5;
      --muted: #9aa5b8;
      --accent: #5b8cff;
      --ok: #59c98a;
      --user: #1d2430;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header small { color: var(--muted); font-weight: 400; margin-left: .5rem; }
    #model {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .5rem;
      font: inherit;
      font-size: .85rem;
      font-weight: 400;
      max-width: 45%;
    }
    #model[hidden] { display: none; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .msg {
      padding: .75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      word-wrap: break-word;
      max-width: 85%;
    }
    .msg.user {
      background: var(--user);
      align-self: flex-end;
      white-space: pre-wrap;
    }
    .msg.assistant {
      background: var(--panel);
      border: 1px solid var(--border);
      align-self: flex-start;
      display: flex;
      flex-direction: column;
      gap: .55rem;
    }
    .msg .content { white-space: pre-wrap; }
    .msg .content.error-text { color: #ffd7d7; }
    .empty { color: var(--muted); text-align: center; margin-top: 3rem; }

    /* Live activity steps (web searches) */
    .activity { display: flex; flex-direction: column; gap: .35rem; }
    .activity:empty { display: none; }
    .step {
      font-size: .85rem;
      color: var(--muted);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .4rem .6rem;
    }
    .step summary {
      list-style: none;
      display: flex;
      align-items: center;
      gap: .45rem;
      cursor: default;
    }
    .step summary::-webkit-details-marker { display: none; }
    .step.expandable summary { cursor: pointer; }
    .step.expandable summary::after { content: "▾"; opacity: .55; margin-left: auto; }
    .step.expandable[open] summary::after { content: "▴"; }
    .step .check { color: var(--ok); flex: none; }
    .step ul { margin: .45rem 0 .1rem; padding-left: 1.2rem; }
    .step li { margin: .15rem 0; }
    .step a { color: var(--accent); text-decoration: none; }
    .step a:hover { text-decoration: underline; }
    .spin {
      width: .8rem; height: .8rem; flex: none;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Typing indicator */
    .content.typing { display: flex; gap: .3rem; align-items: center; min-height: 1.2rem; }
    .dot {
      width: .45rem; height: .45rem; border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }

    /* Per-answer stats footer */
    .stats { font-size: .75rem; color: var(--muted); }
    .stats:empty { display: none; }

    form {
      display: flex;
      gap: .5rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      resize: none;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem;
      font: inherit;
      min-height: 46px;
      max-height: 160px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 0 1.25rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <div>Deepresearch.se <small>deep research</small></div>
    <select id="model" title="Model" hidden></select>
  </header>
  <div id="chat"><div class="empty">Ask a research question to get started. I may ask a follow-up to narrow the scope, then search the web and report back with sources.</div></div>
  <form id="form">
    <textarea id="input" placeholder="Ask a research question… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const modelSel = document.getElementById("model");
    const history = []; // {role, content} pairs sent to the API

    // Model dropdown: populated from /api/models, selection kept in
    // localStorage. If the catalog can't load, the dropdown stays hidden and
    // the server default is used.
    async function loadModels() {
      try {
        const res = await fetch("/api/models");
        if (!res.ok) return;
        const data = await res.json();
        const models = data.models || [];
        if (models.length === 0) return;
        modelSel.replaceChildren();
        for (const m of models) {
          const opt = document.createElement("option");
          opt.value = m.id;
          opt.textContent = m.up === false ? m.name + " (unavailable)" : m.name;
          if (m.up === false) opt.disabled = true;
          if (m.pricing) opt.title = m.pricing;
          modelSel.appendChild(opt);
        }
        const usable = (m) => m.up !== false;
        const saved = localStorage.getItem("model");
        const pick = models.some((m) => m.id === saved && usable(m)) ? saved
          : models.some((m) => m.id === data.default && usable(m)) ? data.default
          : (models.find(usable) || models[0]).id;
        modelSel.value = pick;
        modelSel.hidden = false;
      } catch { /* keep dropdown hidden; server default applies */ }
    }
    modelSel.addEventListener("change", () => localStorage.setItem("model", modelSel.value));
    loadModels();

    const scrollDown = () => { chat.scrollTop = chat.scrollHeight; };
    const clearEmpty = () => { chat.querySelector(".empty")?.remove(); };

    function addUserBubble(text) {
      clearEmpty();
      const el = document.createElement("div");
      el.className = "msg user";
      el.textContent = text;
      chat.appendChild(el);
      scrollDown();
    }

    // An assistant turn = activity panel (search steps) + streamed content
    // (typing dots until the first token) + stats footer.
    function addAssistantTurn() {
      clearEmpty();
      const el = document.createElement("div");
      el.className = "msg assistant";
      const activity = document.createElement("div");
      activity.className = "activity";
      const content = document.createElement("div");
      showTyping(content);
      const stats = document.createElement("div");
      stats.className = "stats";
      el.append(activity, content, stats);
      chat.appendChild(el);
      scrollDown();
      return { el, activity, content, stats, lastStep: null, steps: {}, text: "" };
    }

    // Generic pipeline steps (plan / gap check / synthesis / validation).
    function startGenericStep(turn, id, label) {
      const details = document.createElement("details");
      details.className = "step";
      const summary = document.createElement("summary");
      const spin = document.createElement("span");
      spin.className = "spin";
      const lab = document.createElement("span");
      lab.textContent = label;
      summary.append(spin, lab);
      details.appendChild(summary);
      details.addEventListener("click", (e) => {
        if (!details.classList.contains("expandable")) e.preventDefault();
      });
      turn.activity.appendChild(details);
      turn.steps[id] = { details, summary, label: lab };
      scrollDown();
    }

    function finishGenericStep(turn, s) {
      const step = turn.steps[s.id];
      if (!step) return;
      step.details.classList.add("finished");
      step.summary.querySelector(".spin")?.remove();
      const check = document.createElement("span");
      check.className = "check";
      check.textContent = "✓";
      step.summary.prepend(check);
      step.label.textContent = s.label || "";
      const items = Array.isArray(s.details) ? s.details : [];
      if (items.length) {
        step.details.classList.add("expandable");
        const ul = document.createElement("ul");
        for (const it of items) {
          const li = document.createElement("li");
          li.textContent = String(it);
          ul.appendChild(li);
        }
        step.details.appendChild(ul);
      }
      scrollDown();
    }

    function showTyping(content) {
      content.className = "content typing";
      content.replaceChildren();
      for (let i = 0; i < 3; i++) {
        const d = document.createElement("span");
        d.className = "dot";
        content.appendChild(d);
      }
    }

    function setText(turn, text) {
      if (turn.content.classList.contains("typing")) {
        turn.content.classList.remove("typing");
        turn.content.replaceChildren();
      }
      turn.text = text;
      turn.content.textContent = text;
      scrollDown();
    }

    function setError(turn, message) {
      const text = turn.text ? turn.text + "\n\n[" + message + "]" : message;
      setText(turn, text);
      turn.content.classList.add("error-text");
    }

    // "🔎 Searching the web: …" with a spinner.
    function startSearchStep(turn, query) {
      const details = document.createElement("details");
      details.className = "step";
      const summary = document.createElement("summary");
      const spin = document.createElement("span");
      spin.className = "spin";
      const label = document.createElement("span");
      label.textContent = "Searching the web: “" + query + "”";
      summary.append(spin, label);
      details.appendChild(summary);
      // Block toggling while running (no sources to show yet).
      details.addEventListener("click", (e) => {
        if (!details.classList.contains("finished")) e.preventDefault();
      });
      turn.activity.appendChild(details);
      turn.lastStep = { details, summary, label };
      scrollDown();
    }

    // Resolve the step: checkmark, counts, timing, expandable source list.
    // Server emits start/done sequentially, so `lastStep` is always the match.
    function finishSearchStep(turn, info) {
      const step = turn.lastStep;
      if (!step) return;
      step.details.classList.add("finished", "expandable");
      step.summary.querySelector(".spin")?.remove();
      const check = document.createElement("span");
      check.className = "check";
      check.textContent = "✓";
      step.summary.prepend(check);
      const n = info.results ?? 0;
      step.label.textContent =
        "Searched “" + info.query + "” · " +
        n + (n === 1 ? " result" : " results") + " · " +
        Math.round(info.duration_ms ?? 0) + " ms";
      const ul = document.createElement("ul");
      for (const src of info.sources || []) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = src.url;
        a.textContent = src.title || src.url;
        a.target = "_blank";
        a.rel = "noopener";
        li.appendChild(a);
        ul.appendChild(li);
      }
      step.details.appendChild(ul);
      turn.lastStep = null;
      scrollDown();
    }

    function renderStats(turn, s) {
      const parts = [];
      if (s.model) parts.push(String(s.model).split("/").pop());
      if (s.duration_ms != null) parts.push((s.duration_ms / 1000).toFixed(1) + " s");
      const tokens = (s.prompt_tokens || 0) + (s.completion_tokens || 0);
      if (tokens) parts.push(tokens.toLocaleString() + " tokens");
      if (s.searches) parts.push(s.searches + (s.searches === 1 ? " search" : " searches"));
      if (s.co2_grams) parts.push((s.co2_grams * 1000).toFixed(1) + " mg CO₂");
      turn.stats.textContent = parts.join(" · ");
    }

    function handleEvent(turn, evt, acc) {
      if (evt.error) {
        setError(turn, evt.error);
        return acc;
      }
      if (evt.status) {
        const s = evt.status;
        if (s.type === "search_start") startSearchStep(turn, s.query || "");
        else if (s.type === "search_done") finishSearchStep(turn, s);
        else if (s.type === "step_start") startGenericStep(turn, s.id, s.label || "");
        else if (s.type === "step_done") finishGenericStep(turn, s);
        else if (s.type === "done") renderStats(turn, s);
        else if (s.type === "discard_text") {
          // Server detected a malformed tool call in the streamed text:
          // clear the bubble and keep waiting for the real answer.
          turn.text = "";
          showTyping(turn.content);
          return "";
        }
        // Unknown status types: ignore (forward compatibility).
        return acc;
      }
      const chunk = evt.choices?.[0]?.delta?.content;
      if (chunk) {
        acc += chunk;
        setText(turn, acc);
      }
      return acc;
    }

    async function sendMessage(text) {
      history.push({ role: "user", content: text });
      addUserBubble(text);
      const turn = addAssistantTurn();
      let acc = "";

      try {
        const payload = { messages: history };
        if (!modelSel.hidden && modelSel.value) payload.model = modelSel.value;
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });

        const isJson = (res.headers.get("content-type") || "").includes("application/json");
        if (!res.ok || !res.body || isJson) {
          const err = await res.json().catch(() => ({ error: "Request failed (" + res.status + ")" }));
          setError(turn, err.error || "Something went wrong.");
          history.pop();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data:")) continue;
            const data = line.slice(5).trim();
            if (!data || data === "[DONE]") continue;
            try {
              acc = handleEvent(turn, JSON.parse(data), acc);
            } catch { /* ignore keep-alive / non-JSON lines */ }
          }
        }

        if (acc) {
          history.push({ role: "assistant", content: acc });
        } else if (turn.content.classList.contains("typing")) {
          setError(turn, "No response received.");
          history.pop();
        }
      } catch (e) {
        setError(turn, "Network error: " + e.message);
        history.pop();
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      send.disabled = true;
      await sendMessage(text);
      send.disabled = false;
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
