<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deepresearch.se</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #12151c;
      --border: #232833;
      --text: #e8edf5;
      --muted: #9aa5b8;
      --accent: #5b8cff;
      --user: #1d2430;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    header small { color: var(--muted); font-weight: 400; margin-left: .5rem; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { padding: .75rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .msg.user { background: var(--user); align-self: flex-end; max-width: 85%; }
    .msg.assistant { background: var(--panel); border: 1px solid var(--border); align-self: flex-start; max-width: 85%; }
    .msg.error { background: #3a1d1d; border: 1px solid #6b2b2b; color: #ffd7d7; align-self: flex-start; }
    .empty { color: var(--muted); text-align: center; margin-top: 3rem; }
    form {
      display: flex;
      gap: .5rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      resize: none;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .75rem;
      font: inherit;
      min-height: 46px;
      max-height: 160px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 0 1.25rem;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <header>Deepresearch.se <small>chat</small></header>
  <div id="chat"><div class="empty">Ask me anything to get started.</div></div>
  <form id="form">
    <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)" autofocus></textarea>
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    const history = []; // {role, content} pairs sent to the API

    function addBubble(role, text) {
      const empty = chat.querySelector(".empty");
      if (empty) empty.remove();
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
      return el;
    }

    async function sendMessage(text) {
      history.push({ role: "user", content: text });
      addBubble("user", text);
      const bubble = addBubble("assistant", "");
      let acc = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });

        const isJson = (res.headers.get("content-type") || "").includes("application/json");
        if (!res.ok || !res.body || isJson) {
          const err = await res.json().catch(() => ({ error: "Request failed (" + res.status + ")" }));
          bubble.className = "msg error";
          bubble.textContent = err.error || "Something went wrong.";
          history.pop();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data:")) continue;
            const data = line.slice(5).trim();
            if (!data) continue;
            try {
              const evt = JSON.parse(data);
              if (evt.type === "content_block_delta" && evt.delta?.type === "text_delta") {
                acc += evt.delta.text;
                bubble.textContent = acc;
                chat.scrollTop = chat.scrollHeight;
              }
            } catch { /* ignore keep-alive / non-JSON lines */ }
          }
        }
        history.push({ role: "assistant", content: acc });
      } catch (e) {
        bubble.className = "msg error";
        bubble.textContent = "Network error: " + e.message;
        history.pop();
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      send.disabled = true;
      await sendMessage(text);
      send.disabled = false;
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
